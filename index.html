<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Calculatrice en ligne">
  <title>CalcStudy</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/calcsolver.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Aller au contenu</a>

  <header class="topbar" role="banner">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-dot" aria-hidden="true"></span>
        <strong>CalcSolver</strong>
      </div>
      <nav class="quick-nav" aria-label="Navigation rapide">
        <a href="index.html" class="active">Calculator</a>
      </nav>
    </div>
    <div class="title-wrap">
      <h1>Online Calculator</h1>
      <span class="badge">Fast & Free</span>
    </div>
    <p>Simple calculator for quick operations and school work.</p>
  </header>

  <main class="layout" id="main-content">
    <section class="panel" aria-labelledby="calc-title">
      <h2 id="calc-title" class="sr-only">Calculatrice principale</h2>
      <div class="display" aria-live="polite" aria-atomic="true">
        <div id="expr" aria-label="Expression en cours"></div>
        <output id="result" aria-label="Resultat">0</output>
      </div>
      <div class="keys" id="keys" role="group" aria-label="Touches de calcul">
        <button data-a="c" aria-label="Effacer tout">AC</button><button data-a="d" aria-label="Supprimer un caractere">DEL</button><button data-v="%" aria-label="Modulo">%</button><button data-v="/" aria-label="Division">/</button>
        <button data-v="7" aria-label="Sept">7</button><button data-v="8" aria-label="Huit">8</button><button data-v="9" aria-label="Neuf">9</button><button data-v="*" aria-label="Multiplication">*</button>
        <button data-v="4" aria-label="Quatre">4</button><button data-v="5" aria-label="Cinq">5</button><button data-v="6" aria-label="Six">6</button><button data-v="-" aria-label="Soustraction">-</button>
        <button data-v="1" aria-label="Un">1</button><button data-v="2" aria-label="Deux">2</button><button data-v="3" aria-label="Trois">3</button><button data-v="+" aria-label="Addition">+</button>
        <button data-v="0" class="span2" aria-label="Zero">0</button><button data-v="." aria-label="Point decimal">.</button><button data-a="e" aria-label="Calculer">=</button>
      </div>
    </section>

    <aside class="panel" aria-labelledby="history-title">
      <h2 id="history-title">Historique</h2>
      <ul id="history" aria-live="polite"><li>Aucun calcul pour le moment.</li></ul>
    </aside>
  </main>

  <script src="js/calcsolver.js"></script>
</body>
</html>
